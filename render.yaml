services:
  - type: web
    name: oraclex-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m bot.main
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: AUTO_TRADING
        value: "false"
      - key: PAPER_TRADING
        value: "true"
      - key: BASE_CURRENCY
        value: USD
      - key: STARTING_CAPITAL
        value: "50"
      - key: DEFAULT_TIMEFRAME
        value: Swing
