name: Keepalive Ping

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /tmp/out -w "%{http_code}" https://auto-trader-oraclex.onrender.com/health)
            echo "Attempt $i: HTTP $code"
            cat /tmp/out || true
            echo
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 15
          done
          exit 1
